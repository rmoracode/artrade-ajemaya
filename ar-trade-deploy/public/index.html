<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AJE Trade AR - Realidad Aumentada</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23e30613' width='100' height='100'/><text x='50' y='65' font-size='70' font-weight='bold' fill='white' text-anchor='middle'>AR</text></svg>">

    <!-- A-Frame y AR.js via CDN -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="./src/styles.css">

    <style>
        :root { --aje-red: #e30613; }
        body { margin: 0; overflow: hidden; font-family: 'system-ui', sans-serif; background: #000; }

        #side-menu {
            position: fixed; top: 0; left: 0; width: 280px; height: 100%;
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px);
            z-index: 3000;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2);
            padding: 40px 20px; overflow-y: auto; transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        #side-menu.open { transform: translateX(0); }

        #editor-ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; display: none; flex-direction: column; gap: 10px;
            width: 94%; max-width: 450px;
        }

        .glass-panel {
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-radius: 30px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
        }

        .control-btn {
            background: white; color: black; width: 46px; height: 46px;
            border-radius: 12px; font-weight: 800; display: flex;
            align-items: center; justify-content: center; border: none; cursor: pointer;
        }
        .control-btn:active { transform: scale(0.9); }

        .burger-icon {
            position: fixed; top: 20px; left: 20px; z-index: 3100;
            background: var(--aje-red); color: white; width: 56px; height: 56px;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer;
        }

        #screenshot-btn {
            position: fixed; right: 20px; top: 20px;
            width: 60px; height: 60px; border-radius: 50%;
            background: white; border: 4px solid var(--aje-red);
            z-index: 2500; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .instruction-toast {
            position: fixed; top: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 6px 15px;
            border-radius: 20px; font-size: 9px; font-weight: bold; text-transform: uppercase;
            pointer-events: none; z-index: 1000; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <button type="button" class="burger-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <button id="screenshot-btn" onclick="appAPI.takeSnapshot ? appAPI.takeSnapshot() : console.log('snapshot')">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e30613" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
    </button>

    <div class="instruction-toast">Arrastra para ubicar · Usa el panel para altura/giro</div>

    <div id="side-menu">
        <h2 class="text-3xl font-black italic text-red-600 mb-1">AJE TRADE</h2>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-8">AR Layout Designer v3.0</p>

        <div class="mb-6 pb-6 border-b border-gray-200">
            <label class="text-[10px] font-bold text-gray-500 uppercase">Marca</label>
            <select id="brand-selector" onchange="appAPI.changeBrand(this.value)" class="w-full mt-2 p-2 rounded border border-gray-300 text-sm">
                <option value="aje">AJE / Big Cola</option>
                <option value="ejemplo">Marca Ejemplo</option>
            </select>
        </div>

        <div id="menu-buttons-container" class="space-y-4"></div>
    </div>

    <div id="editor-ui">
        <div class="glass-panel">
            <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                <span id="selected-name" class="text-white text-xs font-black uppercase italic">Editando Objeto</span>
                <button onclick="appAPI.deselectAll()" class="bg-green-600 text-white px-5 py-1.5 rounded-full text-[10px] font-black uppercase">Fijar ✓</button>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div class="flex flex-col items-center gap-2">
                    <span class="text-[8px] text-gray-400 font-bold uppercase">Altura (Y)</span>
                    <div class="flex gap-1">
                        <button onclick="appAPI.transform('y', 0.1)" class="control-btn">+</button>
                        <button onclick="appAPI.transform('y', -0.1)" class="control-btn">-</button>
                    </div>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <span class="text-[8px] text-gray-400 font-bold uppercase">Tamaño</span>
                    <div class="flex gap-1">
                        <button onclick="appAPI.transform('scale', 0.1)" class="control-btn">+</button>
                        <button onclick="appAPI.transform('scale', -0.1)" class="control-btn">-</button>
                    </div>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <span class="text-[8px] text-gray-400 font-bold uppercase">Rotar</span>
                    <div class="flex gap-1">
                        <button onclick="appAPI.transform('rotate', 22.5)" class="control-btn">↻</button>
                        <button onclick="appAPI.transform('rotate', -22.5)" class="control-btn">↺</button>
                    </div>
                </div>
            </div>
            <button onclick="appAPI.deleteSelected()" class="w-full mt-4 text-red-500 text-[9px] font-bold uppercase tracking-widest opacity-60">Eliminar Elemento</button>
        </div>
    </div>

    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">

        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" position="0 5 2" intensity="0.6"></a-light>

        <a-entity id="world"></a-entity>

        <a-camera position="0 0 0" look-controls="enabled: false">
            <a-entity id="cursor-dot" cursor="fuse: false" position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015"
                      material="color: #e30613; shader: flat"></a-entity>
        </a-camera>
    </a-scene>

    <canvas id="snapshot-canvas" style="display:none;"></canvas>

    <!-- Cargar módulos ES -->
    <script type="module" src="./src/main.js"></script>

</body>
</html>
