<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AJE Trade AR - Movimiento Libre</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --aje-red: #e30613; }
        body { margin: 0; overflow: hidden; font-family: 'system-ui', sans-serif; background: #000; }
        
        #side-menu {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px);
            z-index: 3000; transition: left 0.3s ease;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2);
            padding: 40px 20px;
        }
        #side-menu.open { left: 0; }

        #editor-ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; display: none; flex-direction: column; gap: 10px;
            width: 94%; max-width: 450px;
        }

        .glass-panel {
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-radius: 30px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
        }

        .control-btn {
            background: white; color: black; width: 46px; height: 46px;
            border-radius: 12px; font-weight: 800; display: flex;
            align-items: center; justify-content: center; active: scale(0.9);
        }

        .burger-icon {
            position: fixed; top: 20px; left: 20px; z-index: 3100;
            background: var(--aje-red); color: white; width: 56px; height: 56px;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
        }

        #screenshot-btn {
            position: fixed; right: 20px; top: 20px;
            width: 60px; height: 60px; border-radius: 50%;
            background: white; border: 4px solid var(--aje-red);
            z-index: 2500; display: flex; align-items: center; justify-content: center;
        }

        .instruction-toast {
            position: fixed; top: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 6px 15px;
            border-radius: 20px; font-size: 9px; font-weight: bold; text-transform: uppercase;
            pointer-events: none; z-index: 1000; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="burger-icon" onclick="toggleMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </div>

    <div id="screenshot-btn" onclick="takeSnapshot()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e30613" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
    </div>

    <div class="instruction-toast">Arrastra para ubicar · Usa el panel para altura/giro</div>

    <div id="side-menu">
        <h2 class="text-3xl font-black italic text-red-600 mb-1">AJE TRADE</h2>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-8">Layout Designer v3.0</p>
        
        <div class="space-y-4">
            <button onclick="addAsset('cooler')" class="w-full flex items-center gap-4 p-5 rounded-2xl bg-gray-50 border-2 border-transparent active:border-red-600 transition-all text-left">
                <span class="text-4xl">❄️</span>
                <div><p class="font-black text-gray-800 leading-tight">COOLER</p><p class="text-[10px] text-gray-400 mt-1">Exhibición de frío</p></div>
            </button>

            <button onclick="addAsset('afiche')" class="w-full flex items-center gap-4 p-5 rounded-2xl bg-gray-50 border-2 border-transparent active:border-red-600 transition-all text-left">
                <span class="text-4xl">📄</span>
                <div><p class="font-black text-gray-800 leading-tight">AFICHE</p><p class="text-[10px] text-gray-400 mt-1">Material de visibilidad</p></div>
            </button>

            <button onclick="addAsset('exhibidor')" class="w-full flex items-center gap-4 p-5 rounded-2xl bg-gray-50 border-2 border-transparent active:border-red-600 transition-all text-left">
                <span class="text-4xl">📦</span>
                <div><p class="font-black text-gray-800 leading-tight">ISLA</p><p class="text-[10px] text-gray-400 mt-1">Punto de venta masivo</p></div>
            </button>
        </div>
    </div>

    <div id="editor-ui">
        <div class="glass-panel">
            <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                <span id="selected-name" class="text-white text-xs font-black uppercase italic">Editando Objeto</span>
                <button onclick="deselectAll()" class="bg-green-600 text-white px-5 py-1.5 rounded-full text-[10px] font-black uppercase">Fijar ✓</button>
            </div>
            
            <div class="grid grid-cols-3 gap-4">
                <div class="flex flex-col items-center gap-2">
                    <span class="text-[8px] text-gray-400 font-bold uppercase">Altura (Y)</span>
                    <div class="flex gap-1">
                        <button onclick="transform('y', 0.1)" class="control-btn">+</button>
                        <button onclick="transform('y', -0.1)" class="control-btn">-</button>
                    </div>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <span class="text-[8px] text-gray-400 font-bold uppercase">Tamaño</span>
                    <div class="flex gap-1">
                        <button onclick="transform('scale', 0.1)" class="control-btn">+</button>
                        <button onclick="transform('scale', -0.1)" class="control-btn">-</button>
                    </div>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <span class="text-[8px] text-gray-400 font-bold uppercase">Rotar</span>
                    <div class="flex gap-1">
                        <button onclick="transform('rotate', 22.5)" class="control-btn">↻</button>
                        <button onclick="transform('rotate', -22.5)" class="control-btn">↺</button>
                    </div>
                </div>
            </div>
            <button onclick="deleteSelected()" class="w-full mt-4 text-red-500 text-[9px] font-bold uppercase tracking-widest opacity-60">Eliminar Elemento</button>
        </div>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="preserveDrawingBuffer: true; antialias: true;"
        vr-mode-ui="enabled: false"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">
        
        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" position="0 5 2" intensity="0.6"></a-light>

        <a-entity id="world"></a-entity>

        <a-camera position="0 0 0" look-controls="enabled: false">
            <a-entity id="cursor-dot" cursor="fuse: false" position="0 0 -1" 
                      geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015" 
                      material="color: #e30613; shader: flat"></a-entity>
        </a-camera>
    </a-scene>

    <canvas id="snapshot-canvas" style="display:none;"></canvas>

    <script>
        const world = document.getElementById('world');
        const sideMenu = document.getElementById('side-menu');
        const editorUi = document.getElementById('editor-ui');
        const cursorDot = document.getElementById('cursor-dot');
        
        let selectedEl = null;
        let isDragging = false;
        let lastMouseY = 0;
        let lastMouseX = 0;

        function toggleMenu() { sideMenu.classList.toggle('open'); }

        function addAsset(type) {
            const el = document.createElement('a-entity');
            el.setAttribute('class', 'clickable');
            el.setAttribute('position', '0 -1 -3'); 
            el.setAttribute('scale', '1 1 1');
            
            el.addEventListener('mousedown', (e) => {
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                selectElement(el, type);
                cursorDot.setAttribute('material', 'color', '#00ff00');
            });

            let modelHtml = '';
            if(type === 'cooler') {
                modelHtml = `
                <a-box width="0.7" height="1.8" depth="0.7" color="#ffffff">
                    <a-plane position="0 0 0.36" width="0.65" height="1.7" material="color: #a0d8ef; opacity: 0.4; transparent: true"></a-plane>
                    <a-box position="0 0.95 0" width="0.75" height="0.15" depth="0.75" color="#e30613"></a-box>
                    <a-image src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Big_Cola_logo.svg/1200px-Big_Cola_logo.svg.png" position="0 0.95 0.38" width="0.45" height="0.12"></a-image>
                </a-box>`;
            } else if(type === 'afiche') {
                modelHtml = `
                <a-box width="0.8" height="1.2" depth="0.05" color="#e30613">
                    <a-image src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Big_Cola_logo.svg/1200px-Big_Cola_logo.svg.png" position="0 0.3 0.03" width="0.6" height="0.25"></a-image>
                    <a-text value="PUNTO DE ORO" align="center" position="0 -0.2 0.03" scale="0.5 0.5 0.5"></a-text>
                </a-box>`;
            } else if(type === 'exhibidor') {
                modelHtml = `
                <a-box width="1.2" height="0.8" depth="1.2" color="#e30613">
                    <a-box position="0 0.45 0" width="1.25" height="0.05" depth="1.25" color="#fff"></a-box>
                    <a-image src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Big_Cola_logo.svg/1200px-Big_Cola_logo.svg.png" position="0 0 0.61" width="0.8" height="0.3"></a-image>
                </a-box>`;
            }

            el.innerHTML = modelHtml;
            world.appendChild(el);
            selectElement(el, type);
            toggleMenu();
        }

        window.addEventListener('mouseup', () => {
            isDragging = false;
            cursorDot.setAttribute('material', 'color', '#e30613');
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging && selectedEl) {
                const deltaX = (e.clientX - lastMouseX) * 0.01;
                const deltaY = (e.clientY - lastMouseY) * 0.01;
                
                const pos = selectedEl.getAttribute('position');
                // X: Izquierda/Derecha
                // Z: Adelante/Atrás (mapeado al movimiento vertical del ratón/dedo)
                selectedEl.setAttribute('position', {
                    x: pos.x + deltaX,
                    y: pos.y, 
                    z: pos.z + deltaY
                });

                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        });

        function selectElement(el, type) {
            selectedEl = el;
            document.getElementById('selected-name').innerText = `Editando: ${type.toUpperCase()}`;
            editorUi.style.display = 'flex';
        }

        function deselectAll() {
            selectedEl = null;
            editorUi.style.display = 'none';
        }

        function transform(action, val) {
            if(!selectedEl) return;
            if(action === 'scale') {
                const s = selectedEl.getAttribute('scale');
                const next = Math.max(0.1, s.x + val);
                selectedEl.setAttribute('scale', {x: next, y: next, z: next});
            } else if(action === 'rotate') {
                const r = selectedEl.getAttribute('rotation');
                selectedEl.setAttribute('rotation', {x: 0, y: r.y + val, z: 0});
            } else if(action === 'y') {
                const p = selectedEl.getAttribute('position');
                selectedEl.setAttribute('position', {x: p.x, y: p.y + val, z: p.z});
            }
        }

        function deleteSelected() {
            if(selectedEl) {
                selectedEl.parentNode.removeChild(selectedEl);
                deselectAll();
            }
        }

        function takeSnapshot() {
            deselectAll();
            setTimeout(() => {
                const scene = document.querySelector('a-scene');
                const video = document.querySelector('video');
                const canvas = document.getElementById('snapshot-canvas');
                const ctx = canvas.getContext('2d');

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.drawImage(scene.canvas, 0, 0, canvas.width, canvas.height);

                const link = document.createElement('a');
                link.download = `AJE-Layout-${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            }, 100);
        }
    </script>
</body>
</html>
